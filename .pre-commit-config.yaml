repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.7
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.5
    hooks:
      - id: insert-license
        name: "Insert license header"
        args:
          - --license-filepath=LICENSE_HEADER
          - --detect-license-in-X-top-lines=16
        types_or: [python, makefile]
        exclude: ^m3l/third/
